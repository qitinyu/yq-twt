<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style> 
    .one {
        color: #000;
        background-image: linear-gradient(to right,green,yellow) ;
        background-size: 0px 2px;
        background-repeat: no-repeat;
        background-position: left bottom;
    }
    .one:hover {
        background-size: 100% 2px;
        transition:2s;
    }
</style>
<body>
    <span class="one" style="font-size: 1em;">你要好好长大，不要输给风，不要输给雨，不要输给冬雪，不要输给炎夏。少年人，你在孩童时应当快乐，使你的心欢畅，行你所愿行的，见你所愿见的，然而也应当记住黑暗的时日。但愿新的梦想永远不被死域侵蚀，但愿旧的故事与死域一同被忘却，但愿绿色的原野，山丘永远不会变得枯黄，但愿溪水永远清澈，但愿鲜花永远盛开。挚友将再次同行于茂密的森林中，一切美好的事物终将归来，一切痛苦的记忆也会远去，就像溪水净化自己，枯树绽出新芽。最终，森林会记住一切。
你好，谢谢，最后是再见！</span>
</body>
</html>
