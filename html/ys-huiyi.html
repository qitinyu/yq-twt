 <style>
    :root {
      --bg: #ffffff;
      --bg-elevated: #fafafa;
      --fg: #1a1a1a;
      --muted: #71717a;
      --accent: #e8f1f1;
      --accent-light: rgba(13, 148, 136, 0.1);
      --accent-glow: rgba(13, 148, 136, 0.2);
      --card: #f4f4f5;
      --border: #e4e4e7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "./朱雀仿宋.ttf";
    }

    .font-display {
      font-family: 'Playfair Display', serif;
    }

    .containt {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* Top Navigation */
    .top-nav {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* 图标行 - 居中显示 */
    .icon-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      border-radius: 50%;
    }

    .tp {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .tp:hover {
      transform: translate3d(0, -2px, 0);
      border-color: burlywood;
    }

    .tp img {
      width: 40px;
      height: 40px;
      stroke: var(--muted);
      transition: stroke 0.25s ease;
      /* background-color: #1a1a1a; */
      border-radius: 50%;
    }

    .tp:hover img {
      stroke: var(--accent);
    }

    .tp.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .tp.active svg {
      stroke: white;
    }

    /* 标签行 - 居中显示 */
    .tag-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag-row span {
      padding: 8px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tag-row span:hover {
      color: var(--fg);
      border-color: var(--accent);
      background: var(--accent-light);
      transform: translateY(-1px);
    }

    .tag-row span.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Main Content */
    .main-content {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* Left Panel */
    .left {
      width: 360px;
      min-width: 300px;
      background: var(--bg-elevated);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      font-weight: 600;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      flex: 1;
      overflow-y: auto;
      align-content: start;
      padding-right: 4px;
    }

    .preview-grid::-webkit-scrollbar {
      width: 4px;
    }

    .preview-grid::-webkit-scrollbar-track {
      background: var(--border);
      border-radius: 2px;
    }

    .preview-grid::-webkit-scrollbar-thumb {
      background: var(--muted);
      border-radius: 2px;
    }

    .xt {
      aspect-ratio: 4/3;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .xt img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .xt:hover {
      transform: scale(1.02);
      border-color: var(--accent);
      box-shadow: 0 8px 24px var(--shadow);
    }

    .xt:hover img {
      transform: scale(1.08);
    }

    .xt.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .xt-index {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--fg);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .xt:hover .xt-index,
    .xt.active .xt-index {
      opacity: 1;
    }

    /* Right Panel */
    .right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: var(--bg);
      position: relative;
    }

    .main-display {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/10;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 24px 48px var(--shadow);
      border: 1px solid var(--border);
    }

    .main-display img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease;
    }

    .display-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
    }

    .display-info h2 {
      font-size: 24px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
    }

    .display-info p {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    /* Progress indicator */
    .progress-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.2);
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0;
    }

    /* Category label */
    .category-label {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.95);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--fg);
    }

    /* Current category indicator */
    .current-category {
      padding: 12px 16px;
      background: var(--card);
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .current-category h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .current-category p {
      font-size: 12px;
      color: var(--muted);
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .left {
        width: 320px;
        min-width: 260px;
      }
    }

    @media (max-width: 900px) {
      .main-content {
        flex-direction: column;
      }

      .left {
        width: 100%;
        min-width: auto;
        max-height: 45vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .preview-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .right {
        padding: 20px;
      }
    }

    @media (max-width: 600px) {
      .top-nav {
        padding: 12px 16px;
      }

      .tp {
        width: 40px;
        height: 40px;
      }

      .tp svg {
        width: 18px;
        height: 18px;
      }

      .tag-row span {
        padding: 6px 12px;
        font-size: 12px;
      }

      .left {
        padding: 16px;
      }

      .preview-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Entrance animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }

    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.1s; }
    .delay-3 { animation-delay: 0.15s; }
    .delay-4 { animation-delay: 0.2s; }
    .delay-5 { animation-delay: 0.25s; }
    .delay-6 { animation-delay: 0.3s; }
    .delay-7 { animation-delay: 0.35s; }
    .delay-8 { animation-delay: 0.4s; }
  </style>
</head>

    // ============================================
    // 状态变量
    // ============================================
    let currentMode = 'category'; // 'category' 或 'view'
    let currentCategoryIndex = 0;
    let currentViewIndex = -1;
    let currentImageIndex = 0;
    let autoPlayTimer = null;
    const AUTO_PLAY_INTERVAL = 4000;

    // ============================================
    // DOM 元素引用
    // ============================================
    const previewGrid = document.getElementById('previewGrid');
    const mainImage = document.getElementById('mainImage');
    const displayTitle = document.getElementById('displayTitle');
    const displayDesc = document.getElementById('displayDesc');
    const displayCategory = document.getElementById('displayCategory');
    const categoryTitle = document.getElementById('categoryTitle');
    const categoryDesc = document.getElementById('categoryDesc');
    const progressBar = document.getElementById('progressBar');

    // ============================================
    // 核心功能函数
    // ============================================

    // 获取当前显示的图片列表
    function getCurrentImages() {
      if (currentMode === 'view' && currentViewIndex >= 0) {
        return viewsData[currentViewIndex].images;
      }
      return categoriesData[currentCategoryIndex].images;
    }

    // 获取当前显示的名称和描述
    function getCurrentInfo() {
      if (currentMode === 'view' && currentViewIndex >= 0) {
        return {
          name: viewsData[currentViewIndex].name,
          desc: viewsData[currentViewIndex].desc
        };
      }
      return {
        name: categoriesData[currentCategoryIndex].name,
        desc: categoriesData[currentCategoryIndex].desc
      };
    }

    // 渲染预览图
    function renderPreviews() {
      const images = getCurrentImages();
      if (!images || images.length === 0) return;

      previewGrid.innerHTML = '';
      
      images.forEach((img, index) => {
        const div = document.createElement('div');
        div.className = 'xt';
        div.dataset.imageIndex = index;
        div.setAttribute('tabindex', '0');
        div.setAttribute('role', 'button');
        div.setAttribute('aria-label', `查看图片: ${img.title}`);
        
        div.innerHTML = `
          <img src="${img.url}" alt="${img.title}" loading="lazy">
          <span class="xt-index">${index + 1}</span>
        `;
        
        // 点击事件
        div.addEventListener('click', () => selectImage(index));
        
        // 键盘事件
        div.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            selectImage(index);
          }
        });
        
        previewGrid.appendChild(div);
      });
    }

    // 选择图片并显示大图
    function selectImage(index) {
      const images = getCurrentImages();
      if (!images || index < 0 || index >= images.length) return;

      currentImageIndex = index;
      const img = images[index];
      const info = getCurrentInfo();

      // 更新预览图选中状态
      document.querySelectorAll('.xt').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });

      // 更新主图显示
      mainImage.style.opacity = '0';
      setTimeout(() => {
        mainImage.src = img.url;
        mainImage.alt = img.title;
        displayTitle.textContent = img.title;
        displayDesc.textContent = img.desc;
        displayCategory.textContent = info.name;
        mainImage.style.opacity = '1';
      }, 200);

      // 重置自动播放
      resetAutoPlay();
    }

    // 切换分类（第一行图标）
    function switchCategory(categoryIndex) {
      if (categoryIndex < 0 || categoryIndex >= categoriesData.length) return;

      currentMode = 'category';
      currentCategoryIndex = categoryIndex;
      currentViewIndex = -1;
      currentImageIndex = 0;

      const category = categoriesData[categoryIndex];
      
      // 更新图标选中状态
      document.querySelectorAll('.tp').forEach((el) => {
        el.classList.toggle('active', parseInt(el.dataset.category) === categoryIndex);
      });

      // 清除标签选中状态
      document.querySelectorAll('.tag-row span').forEach((el) => {
        el.classList.remove('active');
      });

      // 更新分类标题
      categoryTitle.textContent = category.name;
      categoryDesc.textContent = category.desc;

      // 重新渲染预览图
      renderPreviews();

      // 显示第一张图片
      setTimeout(() => selectImage(0), 100);
    }

    // 切换视图（第二行标签）
    function switchView(viewIndex) {
      if (viewIndex < 0 || viewIndex >= viewsData.length) return;

      currentMode = 'view';
      currentViewIndex = viewIndex;
      currentImageIndex = 0;

      const view = viewsData[viewIndex];
      
      // 更新标签选中状态
      document.querySelectorAll('.tag-row span').forEach((el) => {
        el.classList.toggle('active', parseInt(el.dataset.view) === viewIndex);
      });

      // 清除图标选中状态
      document.querySelectorAll('.tp').forEach((el) => {
        el.classList.remove('active');
      });

      // 更新分类标题
      categoryTitle.textContent = view.name;
      categoryDesc.textContent = view.desc;

      // 重新渲染预览图
      renderPreviews();

      // 显示第一张图片
      setTimeout(() => selectImage(0), 100);
    }

    // ============================================
    // 自动播放功能
    // ============================================
    
    function startAutoPlay() {
      stopAutoPlay();
      
      autoPlayTimer = setInterval(() => {
        const images = getCurrentImages();
        if (!images || images.length === 0) return;
        
        const nextIndex = (currentImageIndex + 1) % images.length;
        selectImage(nextIndex);
      }, AUTO_PLAY_INTERVAL);
      
      // 启动进度条动画
      animateProgress();
    }

    function stopAutoPlay() {
      if (autoPlayTimer) {
        clearInterval(autoPlayTimer);
        autoPlayTimer = null;
      }
    }

    function resetAutoPlay() {
      stopAutoPlay();
      startAutoPlay();
    }

    function animateProgress() {
      progressBar.style.transition = 'none';
      progressBar.style.width = '0';
      
      requestAnimationFrame(() => {
        progressBar.style.transition = `width ${AUTO_PLAY_INTERVAL}ms linear`;
        progressBar.style.width = '100%';
      });
    }

    // ============================================
    // 事件绑定
    // ============================================

    // 绑定第一行图标点击事件
    document.querySelectorAll('.tp').forEach(tp => {
      const handler = () => {
        const categoryIndex = parseInt(tp.dataset.category);
        if (!isNaN(categoryIndex)) {
          switchCategory(categoryIndex);
        }
      };

      tp.addEventListener('click', handler);
      tp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          handler();
        }
      });
    });

    // 绑定第二行标签点击事件
    document.querySelectorAll('.tag-row span').forEach(tag => {
      const handler = () => {
        const viewIndex = parseInt(tag.dataset.view);
        if (!isNaN(viewIndex)) {
          switchView(viewIndex);
        }
      };

      tag.addEventListener('click', handler);
      tag.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          handler();
        }
      });
    });

    // 鼠标悬停时暂停自动播放
    previewGrid.addEventListener('mouseenter', stopAutoPlay);
    previewGrid.addEventListener('mouseleave', startAutoPlay);

    // ============================================
    // 初始化
    // ============================================
    function init() {
      renderPreviews();
      setTimeout(() => selectImage(0), 300);
      startAutoPlay();
    }

    // 确保DOM加载完成后初始化
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
